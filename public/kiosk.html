<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ICMPP Kiosk</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1e293b}
.kiosk{display:flex;flex-direction:column;height:100vh;width:100vw}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;background:linear-gradient(90deg,#fff,#fff,rgba(59,130,246,0.05));border-bottom:1px solid #e2e8f0;flex-shrink:0;position:relative}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,rgba(59,130,246,0.6),rgba(59,130,246,0.3),transparent)}
.header-left{display:flex;align-items:center;gap:20px}
.header-left img{height:80px;width:auto}
.institute-name{font-size:32px;font-weight:700;color:#1e293b;letter-spacing:0.02em}
.institute-accent{color:#3b82f6}
.header-right{display:flex;align-items:center;gap:20px;text-align:right}
.time-display{font-size:48px;font-weight:700;font-family:'Courier New',monospace;letter-spacing:0.05em;color:#1e293b}
.date-display{font-size:18px;color:#64748b;margin-top:4px}
.lang-badge{position:absolute;top:16px;right:180px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;background:rgba(59,130,246,0.1);color:#3b82f6;padding:4px 12px;border-radius:99px}

/* Message bar */
.message-bar{padding:12px 40px;background:rgba(59,130,246,0.1);border-bottom:1px solid rgba(59,130,246,0.2);text-align:center;font-size:20px;color:#3b82f6;font-weight:500;flex-shrink:0;display:none}

/* Main */
.main{flex:1;display:flex;min-height:0}
.video-section{flex:2;display:flex;flex-direction:column;position:relative}
.video-label{padding:20px 40px 12px;font-size:16px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.12em;flex-shrink:0;display:flex;align-items:center;gap:10px}
.pulse-dot{width:10px;height:10px;border-radius:50%;background:#3b82f6;animation:pulse 2s infinite}
.video-container{flex:1;padding:0 40px 20px;display:flex;align-items:center;justify-content:center;min-height:0}
.video-container video{max-width:100%;max-height:100%;border-radius:16px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25)}
.separator{position:absolute;top:0;right:0;bottom:0;width:3px;background:linear-gradient(180deg,transparent 0%,rgba(59,130,246,0.15) 20%,rgba(59,130,246,0.4) 50%,rgba(59,130,246,0.15) 80%,transparent 100%);background-size:100% 200%;animation:sep-flow 4s ease-in-out infinite}

/* Sidebar */
.sidebar{flex:1;min-height:0;background:linear-gradient(180deg,#f8fafc,#fff,#f8fafc);overflow:hidden;position:relative;display:flex;flex-direction:column}
.sidebar-glow{position:absolute;top:0;left:0;right:0;height:96px;background:linear-gradient(180deg,rgba(59,130,246,0.03),transparent);pointer-events:none}
.sidebar-content{flex:1;position:relative;overflow:hidden}
.sidebar-section{position:absolute;inset:0;padding:28px;overflow-y:auto;transition:opacity 0.4s ease,transform 0.4s ease}
.sidebar-section.active{opacity:1;transform:translateY(0)}
.sidebar-section.hidden{opacity:0;transform:translateY(12px);pointer-events:none}

/* Sidebar cards */
.section-title{font-size:16px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title svg{width:20px;height:20px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px;box-shadow:0 2px 6px rgba(0,0,0,0.06);margin-bottom:12px}
.card-urgent{background:#fef2f2;border-color:#fecaca}
.card-high{background:#fffbeb;border-color:#fde68a}

/* Weather */
.weather-temp{font-size:56px;font-weight:700;color:#1e293b}
.weather-cond{font-size:20px;color:#64748b;margin-top:4px}
.weather-details{display:flex;gap:16px;margin-top:10px;font-size:16px;color:#94a3b8}
.weather-location{font-size:15px;color:#94a3b8;margin-top:12px}

/* Event/Room items */
.item-row{display:flex;justify-content:space-between;align-items:center;font-size:15px;color:#64748b;padding:6px 0}
.item-title{font-size:18px;font-weight:500;color:#334155;margin-bottom:6px}
.status-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.status-available{background:#10b981}
.status-occupied{background:#ef4444;animation:pulse 2s infinite}
.status-label{font-size:17px;font-weight:500;margin-left:10px}

/* Dots nav */
.dots-nav{display:flex;justify-content:center;gap:10px;padding:16px;flex-shrink:0;border-top:1px solid rgba(0,0,0,0.05)}
.dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.5s;cursor:pointer;border:none;padding:0}
.dot.active{width:32px;background:#3b82f6;box-shadow:0 0 10px rgba(59,130,246,0.5)}

/* Ticker */
.ticker{background:linear-gradient(90deg,#0f172a,#1e293b,#0f172a);color:#fff;height:48px;overflow:hidden;flex-shrink:0;position:relative;display:none}
.ticker::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0.4),transparent)}
.ticker-inner{display:flex;align-items:center;white-space:nowrap;height:100%;animation:ticker-scroll 30s linear infinite}
.ticker-msg{display:inline-flex;align-items:center;gap:14px;padding:0 32px;font-size:20px}
.ticker-dot{width:8px;height:8px;border-radius:50%;background:#3b82f6;flex-shrink:0}

/* Footer */
.footer{display:flex;align-items:center;justify-content:space-between;padding:14px 40px;background:linear-gradient(90deg,#1e293b,#1e293b,#0f172a);color:#cbd5e1;font-size:16px;flex-shrink:0;position:relative}
.footer::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0.4),transparent)}
.footer-left{display:flex;align-items:center;gap:28px}
.footer a{color:rgba(59,130,246,0.8);text-decoration:none}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes sep-flow{0%{background-position:0 0}100%{background-position:0 200%}}
</style>
</head>
<body>
<div class="kiosk">
  <!-- Header -->
  <div class="header">
    <div class="lang-badge" id="langBadge">🇷🇴 RO</div>
    <div class="header-left">
      <img src="/logo-icmpp.png" alt="ICMPP">
      <div>
        <div class="institute-name" id="instName">
          Institutul de Chimie Macromoleculară
          <span class="institute-accent">„Petru Poni"</span> Iași
        </div>
      </div>
    </div>
    <div class="header-right">
      <div>
        <div class="time-display" id="clock">--:--</div>
        <div class="date-display" id="dateStr"></div>
      </div>
    </div>
  </div>

  <!-- Message bar -->
  <div class="message-bar" id="msgBar"></div>

  <!-- Main -->
  <div class="main">
    <!-- Video -->
    <div class="video-section">
      <div class="video-label">
        <span class="pulse-dot"></span>
        <span id="videoLabel">Prezentare Institut</span>
      </div>
      <div class="video-container">
        <video id="video" muted playsinline autoplay src="https://icmpp.ro/files/70/INSTITUTUL%20PP%202_final.mp4"></video>
      </div>
      <div class="separator"></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-glow"></div>
      <div class="sidebar-content">
        <!-- Section 0: Weather -->
        <div class="sidebar-section active" id="sec0">
          <div class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>
            Meteo
          </div>
          <div id="weatherContent">
            <div style="color:#94a3b8;font-size:14px">Se încarcă meteo...</div>
          </div>
        </div>
        <!-- Section 1: Announcements -->
        <div class="sidebar-section hidden" id="sec1">
          <div class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 11 18-5v12L3 13v-2z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
            Anunțuri
          </div>
          <div id="annContent"><div style="color:#94a3b8;font-size:13px">Niciun anunț</div></div>
        </div>
        <!-- Section 2: Events -->
        <div class="sidebar-section hidden" id="sec2">
          <div class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            Evenimente
          </div>
          <div id="eventsContent"><div style="color:#94a3b8;font-size:13px">Niciun eveniment</div></div>
        </div>
        <!-- Section 3: Rooms -->
        <div class="sidebar-section hidden" id="sec3">
          <div class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 4h3a2 2 0 0 1 2 2v14"/><path d="M2 20h3"/><path d="M13 20h9"/><path d="M10 12v.01"/><path d="M13 4.562v16.157a1 1 0 0 1-1.242.97L5 20V5.562a2 2 0 0 1 1.515-1.94l4-1A2 2 0 0 1 13 4.561Z"/></svg>
            Săli azi
          </div>
          <div id="roomsContent"><div style="color:#94a3b8;font-size:13px">Se încarcă...</div></div>
        </div>
      </div>
      <div class="dots-nav" id="dotsNav">
        <button class="dot active" onclick="goTo(0)"></button>
        <button class="dot" onclick="goTo(1)"></button>
        <button class="dot" onclick="goTo(2)"></button>
        <button class="dot" onclick="goTo(3)"></button>
      </div>
    </div>
  </div>

  <!-- Ticker -->
  <div class="ticker" id="ticker">
    <div class="ticker-inner" id="tickerInner"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-left">
      <span>⏰ Program: L–V 7:30–16:00</span>
      <span>📞 Secretariat: <strong style="color:#e2e8f0">0332 880 220</strong></span>
      <a href="mailto:pponi@icmpp.ro">pponi@icmpp.ro</a>
    </div>
    <div>🏛 Aleea Grigore Ghica Vodă 41A, 700487 Iași</div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://erghywhqrxmwqptusbxd.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyZ2h5d2hxcnhtd3FwdHVzYnhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ5MzkwMzMsImV4cCI6MjA4MDUxNTAzM30.K3sZj4KFFgfD0mGFJLKd3cSZFuQtAgVCiOkBeuP1u7Y';
var DAYS_RO = ['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
var MONTHS_RO = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
var lang = 'ro';
var activeSection = 0;
var totalSections = 4;

// ── Clock ──
function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
  document.getElementById('dateStr').textContent =
    DAYS_RO[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS_RO[now.getMonth()] + ' ' + now.getFullYear();
}
setInterval(updateClock, 1000);
updateClock();

// ── Sidebar rotation ──
function goTo(idx) {
  activeSection = idx;
  for (var i = 0; i < totalSections; i++) {
    var el = document.getElementById('sec' + i);
    var dot = document.getElementById('dotsNav').children[i];
    if (i === idx) {
      el.className = 'sidebar-section active';
      dot.className = 'dot active';
    } else {
      el.className = 'sidebar-section hidden';
      dot.className = 'dot';
    }
  }
}
setInterval(function() {
  goTo((activeSection + 1) % totalSections);
}, 10000);

// ── Video loop + lang toggle ──
var video = document.getElementById('video');
video.addEventListener('ended', function() {
  lang = lang === 'ro' ? 'en' : 'ro';
  document.getElementById('langBadge').textContent = lang === 'ro' ? '🇷🇴 RO' : '🇬🇧 EN';
  if (lang === 'en') {
    document.getElementById('instName').innerHTML = 'Institute of Macromolecular Chemistry <span class="institute-accent">"Petru Poni"</span> Iași';
    document.getElementById('videoLabel').textContent = 'Institute Presentation';
  } else {
    document.getElementById('instName').innerHTML = 'Institutul de Chimie Macromoleculară <span class="institute-accent">„Petru Poni"</span> Iași';
    document.getElementById('videoLabel').textContent = 'Prezentare Institut';
  }
  video.play();
});

// ── Supabase REST helper ──
function sbFetch(table, params, cb) {
  var url = SUPABASE_URL + '/rest/v1/' + table + '?' + params;
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.onload = function() {
    if (xhr.status === 200) cb(JSON.parse(xhr.responseText));
  };
  xhr.send();
}

// ── Weather ──
function fetchWeather() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET','https://api.open-meteo.com/v1/forecast?latitude=47.1585&longitude=27.6014&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=Europe%2FBucharest');
  xhr.onload = function() {
    if (xhr.status !== 200) return;
    var d = JSON.parse(xhr.responseText).current;
    var code = d.weather_code;
    var cond = code === 0 ? 'Cer senin' : code <= 3 ? 'Parțial noros' : (code >= 61 && code <= 67) ? 'Ploaie' : (code >= 71 && code <= 77) ? 'Ninsoare' : code >= 95 ? 'Furtună' : 'Variabil';
    document.getElementById('weatherContent').innerHTML =
      '<div class="weather-temp">' + Math.round(d.temperature_2m) + '°C</div>' +
      '<div class="weather-cond">' + cond + '</div>' +
      '<div class="weather-details"><span>💧 ' + d.relative_humidity_2m + '%</span><span>💨 ' + Math.round(d.wind_speed_10m) + ' km/h</span></div>' +
      '<div class="weather-location">📍 Iași, România</div>';
  };
  xhr.send();
}
fetchWeather();
setInterval(fetchWeather, 600000);

// ── Announcements ──
function fetchAnnouncements() {
  sbFetch('announcements', 'select=id,title,content,priority,is_pinned,created_at&or=(is_pinned.eq.true,priority.eq.urgent,priority.eq.high)&order=created_at.desc&limit=6', function(data) {
    if (!data || !data.length) { document.getElementById('annContent').innerHTML = '<div style="color:#94a3b8;font-size:18px">Niciun anunț important</div>'; return; }
    var html = '';
    data.forEach(function(a) {
      var cls = a.priority === 'urgent' ? ' card-urgent' : a.priority === 'high' ? ' card-high' : '';
      var short = a.content.length > 120 ? a.content.substring(0,120).replace(/\s+\S*$/, '') + '…' : a.content;
      html += '<div class="card' + cls + '"><div class="item-title">' + a.title + '</div><div style="font-size:15px;color:#64748b;margin-top:6px">' + short + '</div></div>';
    });
    document.getElementById('annContent').innerHTML = html;
  });
}
fetchAnnouncements();
setInterval(fetchAnnouncements, 60000);

// ── Events ──
function fetchEvents() {
  var now = new Date().toISOString();
  sbFetch('events', 'select=id,title,start_date,location&start_date=gte.' + now + '&order=start_date.asc&limit=5', function(data) {
    if (!data || !data.length) { document.getElementById('eventsContent').innerHTML = '<div style="color:#94a3b8;font-size:18px">Niciun eveniment programat</div>'; return; }
    var html = '';
    data.forEach(function(e) {
      var d = new Date(e.start_date);
      var dateStr = d.getDate() + ' ' + MONTHS_RO[d.getMonth()].substring(0,3) + ' · ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      html += '<div class="card"><div class="item-title">' + e.title + '</div><div class="item-row"><span>' + dateStr + '</span>' + (e.location ? '<span>📍 ' + e.location + '</span>' : '') + '</div></div>';
    });
    document.getElementById('eventsContent').innerHTML = html;
  });
}
fetchEvents();
setInterval(fetchEvents, 60000);

// ── Room Bookings ──
function fetchRooms() {
  var now = new Date();
  var start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
  var end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59).toISOString();
  sbFetch('room_bookings', 'select=id,room,title,start_time,end_time,status&start_time=gte.' + start + '&start_time=lte.' + end + '&status=eq.confirmed&order=start_time.asc', function(data) {
    var rooms = ['Sala de Conferințe', 'Bibliotecă'];
    var html = '';
    rooms.forEach(function(room) {
      var rb = (data || []).filter(function(b) { return b.room === room; });
      var current = rb.find(function(b) { return new Date(b.start_time) <= now && new Date(b.end_time) > now; });
      var next = rb.filter(function(b) { return new Date(b.start_time) > now; }).slice(0, 2);
      html += '<div class="card"><div style="font-size:12px;font-weight:600;color:#334155;margin-bottom:8px">' + room + '</div>';
      if (current) {
        var cs = new Date(current.start_time), ce = new Date(current.end_time);
        html += '<div style="display:flex;align-items:center;gap:8px"><span class="status-dot status-occupied"></span><span class="status-label" style="color:#dc2626">Ocupat: ' + String(cs.getHours()).padStart(2,'0')+':'+String(cs.getMinutes()).padStart(2,'0') + '–' + String(ce.getHours()).padStart(2,'0')+':'+String(ce.getMinutes()).padStart(2,'0') + '</span></div>';
      } else {
        html += '<div style="display:flex;align-items:center;gap:8px"><span class="status-dot status-available"></span><span class="status-label" style="color:#059669">Disponibil acum</span></div>';
      }
      if (next.length) {
        html += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid #f1f5f9">';
        next.forEach(function(b) {
          var s = new Date(b.start_time), e = new Date(b.end_time);
          html += '<div class="item-row"><span style="max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + b.title + '</span><span style="color:#94a3b8">' + String(s.getHours()).padStart(2,'0')+':'+String(s.getMinutes()).padStart(2,'0') + '–' + String(e.getHours()).padStart(2,'0')+':'+String(e.getMinutes()).padStart(2,'0') + '</span></div>';
        });
        html += '</div>';
      } else if (!current) {
        html += '<div style="font-size:11px;color:#94a3b8;margin-top:4px">Fără rezervări programate</div>';
      }
      html += '</div>';
    });
    document.getElementById('roomsContent').innerHTML = html;
  });
}
fetchRooms();
setInterval(fetchRooms, 60000);

// ── Settings (kiosk message + ticker) ──
function fetchSettings() {
  sbFetch('app_settings', 'select=key,value', function(data) {
    if (!data) return;
    var map = {};
    data.forEach(function(r) { map[r.key] = r.value; });
    // Kiosk message
    var msgBar = document.getElementById('msgBar');
    if (typeof map.kiosk_message === 'string' && map.kiosk_message) {
      msgBar.textContent = map.kiosk_message;
      msgBar.style.display = 'block';
    } else {
      msgBar.style.display = 'none';
    }
    // Ticker
    var ticker = document.getElementById('ticker');
    var msgs = Array.isArray(map.kiosk_ticker_messages) ? map.kiosk_ticker_messages : [];
    if (msgs.length) {
      var html = '';
      for (var i = 0; i < 2; i++) {
        msgs.forEach(function(m) {
          html += '<span class="ticker-msg"><span class="ticker-dot"></span>' + m + '</span>';
        });
      }
      document.getElementById('tickerInner').innerHTML = html;
      ticker.style.display = 'block';
      document.getElementById('tickerInner').style.animationDuration = Math.max(msgs.length * 8, 20) + 's';
    } else {
      ticker.style.display = 'none';
    }
    // Kiosk enabled
    if (map.kiosk_enabled === false) {
      document.querySelector('.kiosk').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;text-align:center"><div><div style="font-size:48px;color:#cbd5e1;margin-bottom:16px">📺</div><h1 style="font-size:24px;font-weight:700;color:#94a3b8">Mod Kiosk dezactivat</h1><p style="color:#94a3b8;margin-top:8px">Ecranul TV este momentan oprit de administrator.</p></div></div>';
    }
  });
}
fetchSettings();
setInterval(fetchSettings, 60000);

// Auto-reload every 6 hours
setTimeout(function() { location.reload(); }, 6 * 3600000);
</script>
</body>
</html>
